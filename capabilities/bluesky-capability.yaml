        method: GET
        description: Bluesky Get information about a feed generator.
        inputParameters:
        - name: feed
          in: query
          type: string
          required: true
          description: AT-URI of the feed generator record.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
