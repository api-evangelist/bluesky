    - name: xrpc-app-bsky-feed-getlikes
      path: /xrpc/app.bsky.feed.getLikes
      operations:
      - name: feedgetlikes
        method: GET
        description: Bluesky Get like records which reference a subject (by AT-URI and CID).
        inputParameters:
        - name: uri
          in: query
          type: string
          required: true
          description: AT-URI of the subject (eg, a post record).
        - name: cid
          in: query
          type: string
          description: CID of the subject record (aka, specific version of record), to filter likes.
        - name: limit
          in: query
          type: integer
        - name: cursor
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: xrpc-app-bsky-feed-getlistfeed
      path: /xrpc/app.bsky.feed.getListFeed
      operations:
      - name: feedgetlistfeed
        method: GET
        description: Bluesky Get a feed of recent posts from a list (posts and reposts from any actors on the list).
        inputParameters:
        - name: list
          in: query
          type: string
          required: true
          description: Reference (AT-URI) to the list record.
        - name: limit
          in: query
          type: integer
        - name: cursor
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
