        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: includeUsed
          in: query
          type: boolean
        - name: createAvailable
          in: query
          type: boolean
          description: Controls whether any new 'earned' but not 'created' invites should be created.
    - name: xrpc-com.atproto.server.getServiceAuth
