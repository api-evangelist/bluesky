naftiko: 1.0.0-alpha2
info:
  label: Bluesky Social API — Server
  description: 'Bluesky Social API — Server. 25 operations. Lead operation: Bluesky Activates a currently deactivated account..
    Self-contained Naftiko capability covering one Bluesky business surface.'
  tags:
  - Bluesky
  - Server
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BLUESKY_API_KEY: BLUESKY_API_KEY
capability:
