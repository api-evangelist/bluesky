    - name: xrpc-com.atproto.server.createSession
      path: /xrpc/com.atproto.server.createSession
      operations:
      - name: servercreatesession
        method: POST
        description: Bluesky Create an authentication session.
        outputRawFormat: json
        outputParameters:
