        method: GET
        description: Bluesky Get a signed token on behalf of the requesting DID for the requested service.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: aud
          in: query
          type: string
          description: The DID of the service that the token will be used to authenticate with
          required: true
        - name: exp
          in: query
          type: integer
          description: The time in Unix Epoch seconds that the JWT expires. Defaults to 60 seconds in the future. The service
            may enforce certain time bounds on tokens depending on th
        - name: lxm
          in: query
          type: string
          description: Lexicon (XRPC) method to bind the requested token to
