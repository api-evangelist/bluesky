    - name: xrpc-com.atproto.server.deleteAccount
      path: /xrpc/com.atproto.server.deleteAccount
      operations:
      - name: serverdeleteaccount
        method: POST
        description: Bluesky Delete an actor's account with a token and password.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: xrpc-com.atproto.server.deleteSession
      path: /xrpc/com.atproto.server.deleteSession
      operations:
      - name: serverdeletesession
        method: POST
        description: Bluesky Delete the current session.
        outputRawFormat: json
        outputParameters:
