  - type: http
    namespace: bluesky-server
    baseUri: https://bsky.social/xrpc
    description: Bluesky Social API — Server business capability. Self-contained, no shared references.
    resources:
    - name: xrpc-com.atproto.server.activateAccount
      path: /xrpc/com.atproto.server.activateAccount
      operations:
      - name: serveractivateaccount
        method: POST
        description: Bluesky Activates a currently deactivated account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: xrpc-com.atproto.server.checkAccountStatus
      path: /xrpc/com.atproto.server.checkAccountStatus
      operations:
      - name: servercheckaccountstatus
        method: GET
        description: Bluesky Returns the status of an account, especially as pertaining to import or recovery.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: xrpc-com.atproto.server.confirmEmail
      path: /xrpc/com.atproto.server.confirmEmail
      operations:
      - name: serverconfirmemail
        method: POST
        description: Bluesky Confirm an email using a token from com.atproto.server.requestEmailConfirmation.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: xrpc-com.atproto.server.createAccount
      path: /xrpc/com.atproto.server.createAccount
      operations:
      - name: servercreateaccount
        method: POST
        description: Bluesky Create an account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: xrpc-com.atproto.server.createAppPassword
      path: /xrpc/com.atproto.server.createAppPassword
      operations:
      - name: servercreateapppassword
        method: POST
        description: Bluesky Create an App Password.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: xrpc-com.atproto.server.createInviteCode
      path: /xrpc/com.atproto.server.createInviteCode
