naftiko: 1.0.0-alpha2
info:
  label: Bluesky Social API — Ozone Server
  description: 'Bluesky Social API — Ozone Server. 1 operations. Lead operation: Bluesky Get details about ozone''s server
    configuration.. Self-contained Naftiko capability covering one Bluesky business surface.'
  tags:
  - Bluesky
  - Ozone Server
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BLUESKY_API_KEY: BLUESKY_API_KEY
capability:
  consumes:
  - type: http
    namespace: bluesky-ozone-server
    baseUri: https://bsky.social/xrpc
    description: Bluesky Social API — Ozone Server business capability. Self-contained, no shared references.
    resources:
    - name: xrpc-tools.ozone.server.getConfig
      path: /xrpc/tools.ozone.server.getConfig
      operations:
      - name: ozoneservergetconfig
        method: GET
        description: Bluesky Get details about ozone's server configuration.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.BLUESKY_API_KEY}}'
  exposes:
  - type: rest
    namespace: bluesky-ozone-server-rest
    port: 8080
    description: REST adapter for Bluesky Social API — Ozone Server. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/xrpc/tools-ozone-server-getconfig
      name: xrpc-tools-ozone-server-getconfig
      description: REST surface for xrpc-tools.ozone.server.getConfig.
      operations:
      - method: GET
        name: ozoneservergetconfig
        description: Bluesky Get details about ozone's server configuration.
        call: bluesky-ozone-server.ozoneservergetconfig
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bluesky-ozone-server-mcp
    port: 9090
    transport: http
    description: MCP adapter for Bluesky Social API — Ozone Server. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: bluesky-get-details-about-ozone-s
      description: Bluesky Get details about ozone's server configuration.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bluesky-ozone-server.ozoneservergetconfig
      outputParameters:
      - type: object
        mapping: $.
