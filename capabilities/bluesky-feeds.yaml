  - type: mcp
    namespace: bluesky-feeds-mcp
    port: 9090
    transport: http
    description: MCP adapter for Bluesky Social API — Feeds. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: bluesky-get-information-about-feed
      description: Bluesky Get information about a feed generator, including policies and offered feed URIs.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bluesky-feeds.feeddescribefeedgenerator
      outputParameters:
      - type: object
        mapping: $.
    - name: bluesky-get-list-feeds-feed
      description: Bluesky Get a list of feeds (feed generator records) created by the actor (in the actor's repo).
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bluesky-feeds.feedgetactorfeeds
      with:
        actor: tools.actor
        limit: tools.limit
        cursor: tools.cursor
      outputParameters:
      - type: object
        mapping: $.
    - name: bluesky-get-list-posts-liked
      description: Bluesky Get a list of posts liked by an actor.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bluesky-feeds.feedgetactorlikes
      with:
        actor: tools.actor
        limit: tools.limit
        cursor: tools.cursor
      outputParameters:
      - type: object
        mapping: $.
