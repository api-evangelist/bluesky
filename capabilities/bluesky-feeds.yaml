naftiko: 1.0.0-alpha2
info:
  label: Bluesky Social API — Feeds
  description: 'Bluesky Social API — Feeds. 18 operations. Lead operation: Bluesky Get information about a feed generator,
    including policies and offered feed URIs.. Self-contained Naftiko capability covering one Bluesky business surface.'
  tags:
  - Bluesky
  - Feeds
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BLUESKY_API_KEY: BLUESKY_API_KEY
capability:
  consumes:
  - type: http
    namespace: bluesky-feeds
    baseUri: https://bsky.social/xrpc
    description: Bluesky Social API — Feeds business capability. Self-contained, no shared references.
    resources:
    - name: xrpc-app.bsky.feed.describeFeedGenerator
      path: /xrpc/app.bsky.feed.describeFeedGenerator
      operations:
      - name: feeddescribefeedgenerator
        method: GET
        description: Bluesky Get information about a feed generator, including policies and offered feed URIs.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: xrpc-app.bsky.feed.getActorFeeds
      path: /xrpc/app.bsky.feed.getActorFeeds
      operations:
      - name: feedgetactorfeeds
        method: GET
        description: Bluesky Get a list of feeds (feed generator records) created by the actor (in the actor's repo).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: actor
          in: query
          type: string
          required: true
        - name: limit
          in: query
          type: integer
        - name: cursor
          in: query
          type: string
    - name: xrpc-app.bsky.feed.getActorLikes
      path: /xrpc/app.bsky.feed.getActorLikes
      operations:
      - name: feedgetactorlikes
        method: GET
        description: Bluesky Get a list of posts liked by an actor.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: actor
          in: query
          type: string
          required: true
        - name: limit
          in: query
          type: integer
        - name: cursor
          in: query
          type: string
    - name: xrpc-app.bsky.feed.getAuthorFeed
      path: /xrpc/app.bsky.feed.getAuthorFeed
      operations:
      - name: feedgetauthorfeed
        method: GET
        description: Bluesky Get a view of an actor's 'author feed' (post and reposts by the author).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: actor
          in: query
          type: string
          required: true
        - name: limit
          in: query
          type: integer
        - name: cursor
          in: query
          type: string
        - name: filter
          in: query
          type: string
          description: Combinations of post/repost types to include in response.
        - name: includePins
          in: query
          type: boolean
    - name: xrpc-app.bsky.feed.getFeed
      path: /xrpc/app.bsky.feed.getFeed
      operations:
      - name: feedgetfeed
        method: GET
        description: Bluesky Get a hydrated feed from an actor's selected feed generator.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: feed
          in: query
          type: string
          required: true
        - name: limit
          in: query
          type: integer
        - name: cursor
          in: query
          type: string
    - name: xrpc-app.bsky.feed.getFeedGenerator
      path: /xrpc/app.bsky.feed.getFeedGenerator
      operations:
      - name: feedgetfeedgenerator
        method: GET
        description: Bluesky Get information about a feed generator.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: feed
          in: query
          type: string
          description: AT-URI of the feed generator record.
          required: true
    - name: xrpc-app.bsky.feed.getFeedGenerators
      path: /xrpc/app.bsky.feed.getFeedGenerators
      operations:
      - name: feedgetfeedgenerators
        method: GET
        description: Bluesky Get information about a list of feed generators.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: feeds
          in: query
          type: array
          required: true
    - name: xrpc-app.bsky.feed.getFeedSkeleton
      path: /xrpc/app.bsky.feed.getFeedSkeleton
      operations:
      - name: feedgetfeedskeleton
        method: GET
        description: Bluesky Get a skeleton of a feed provided by a feed generator.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: feed
          in: query
          type: string
          description: Reference to feed generator record describing the specific feed being requested.
          required: true
        - name: limit
          in: query
          type: integer
        - name: cursor
          in: query
          type: string
    - name: xrpc-app.bsky.feed.getLikes
      path: /xrpc/app.bsky.feed.getLikes
      operations:
      - name: feedgetlikes
        method: GET
        description: Bluesky Get like records which reference a subject (by AT-URI and CID).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: uri
          in: query
          type: string
          description: AT-URI of the subject (eg, a post record).
          required: true
        - name: cid
          in: query
          type: string
          description: CID of the subject record (aka, specific version of record), to filter likes.
        - name: limit
          in: query
          type: integer
        - name: cursor
          in: query
          type: string
    - name: xrpc-app.bsky.feed.getListFeed
      path: /xrpc/app.bsky.feed.getListFeed
      operations:
      - name: feedgetlistfeed
        method: GET
        description: Bluesky Get a feed of recent posts from a list (posts and reposts from any actors on the list).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: list
          in: query
          type: string
          description: Reference (AT-URI) to the list record.
          required: true
        - name: limit
          in: query
          type: integer
        - name: cursor
          in: query
          type: string
    - name: xrpc-app.bsky.feed.getPostThread
      path: /xrpc/app.bsky.feed.getPostThread
      operations:
      - name: feedgetpostthread
        method: GET
        description: Bluesky Get posts in a thread.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: uri
          in: query
          type: string
          description: Reference (AT-URI) to post record.
          required: true
        - name: depth
          in: query
          type: integer
          description: How many levels of reply depth should be included in response.
        - name: parentHeight
          in: query
          type: integer
          description: How many levels of parent (and grandparent, etc) post to include.
    - name: xrpc-app.bsky.feed.getPosts
      path: /xrpc/app.bsky.feed.getPosts
      operations:
      - name: feedgetposts
        method: GET
        description: Bluesky Gets post views for a specified list of posts (by AT-URI).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: uris
          in: query
          type: array
          description: List of post AT-URIs to return hydrated views for.
          required: true
    - name: xrpc-app.bsky.feed.getQuotes
      path: /xrpc/app.bsky.feed.getQuotes
      operations:
      - name: feedgetquotes
        method: GET
        description: Bluesky Get a list of quotes for a given post.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: uri
          in: query
          type: string
          description: Reference (AT-URI) of post record
          required: true
        - name: cid
          in: query
          type: string
          description: If supplied, filters to quotes of specific version (by CID) of the post record.
        - name: limit
          in: query
          type: integer
        - name: cursor
          in: query
          type: string
    - name: xrpc-app.bsky.feed.getRepostedBy
      path: /xrpc/app.bsky.feed.getRepostedBy
      operations:
      - name: feedgetrepostedby
        method: GET
        description: Bluesky Get a list of reposts for a given post.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: uri
          in: query
          type: string
          description: Reference (AT-URI) of post record
          required: true
        - name: cid
          in: query
          type: string
          description: If supplied, filters to reposts of specific version (by CID) of the post record.
        - name: limit
          in: query
          type: integer
        - name: cursor
          in: query
          type: string
    - name: xrpc-app.bsky.feed.getSuggestedFeeds
      path: /xrpc/app.bsky.feed.getSuggestedFeeds
      operations:
      - name: feedgetsuggestedfeeds
        method: GET
        description: Bluesky Get a list of suggested feeds (feed generators) for the requesting account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: cursor
          in: query
          type: string
    - name: xrpc-app.bsky.feed.getTimeline
      path: /xrpc/app.bsky.feed.getTimeline
      operations:
      - name: feedgettimeline
        method: GET
        description: Bluesky Get a view of the requesting account's home timeline.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: algorithm
          in: query
          type: string
          description: 'Variant ''algorithm'' for timeline. Implementation-specific. NOTE: most feed flexibility has been
            moved to feed generator mechanism.'
        - name: limit
          in: query
          type: integer
        - name: cursor
          in: query
          type: string
    - name: xrpc-app.bsky.feed.searchPosts
      path: /xrpc/app.bsky.feed.searchPosts
      operations:
      - name: feedsearchposts
        method: GET
        description: Bluesky Find posts matching search criteria, returning views of those posts.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
          description: Search query string; syntax, phrase, boolean, and faceting is unspecified, but Lucene query syntax
            is recommended.
          required: true
        - name: sort
          in: query
          type: string
          description: Specifies the ranking order of results.
        - name: since
          in: query
          type: string
          description: Filter results for posts after the indicated datetime (inclusive). Expected to use 'sortAt' timestamp,
            which may not match 'createdAt'. Can be a datetime, or ju
        - name: until
          in: query
          type: string
          description: 'Filter results for posts before the indicated datetime (not inclusive). Expected to use ''sortAt''
            timestamp, which may not match ''createdAt''. Can be a datetime, '
        - name: mentions
          in: query
          type: string
          description: Filter to posts which mention the given account. Handles are resolved to DID before query-time. Only
            matches rich-text facet mentions.
        - name: author
          in: query
          type: string
          description: Filter to posts by the given account. Handles are resolved to DID before query-time.
        - name: lang
          in: query
          type: string
          description: Filter to posts in the given language. Expected to be based on post language field, though server may
            override language detection.
        - name: domain
          in: query
          type: string
          description: Filter to posts with URLs (facet links or embeds) linking to the given domain (hostname). Server may
            apply hostname normalization.
        - name: url
          in: query
          type: string
          description: Filter to posts with links (facet links or embeds) pointing to this URL. Server may apply URL normalization
            or fuzzy matching.
        - name: tag
          in: query
          type: array
          description: Filter to posts with the given tag (hashtag), based on rich-text facet or tag field. Do not include
            the hash (#) prefix. Multiple tags can be specified, with 'A
        - name: limit
          in: query
          type: integer
        - name: cursor
          in: query
          type: string
          description: Optional pagination mechanism; may not necessarily allow scrolling through entire result set.
    - name: xrpc-app.bsky.feed.sendInteractions
      path: /xrpc/app.bsky.feed.sendInteractions
      operations:
      - name: feedsendinteractions
        method: POST
        description: Bluesky Send information about interactions with feed items back to the feed generator that served them.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.BLUESKY_API_KEY}}'
  exposes:
  - type: rest
    namespace: bluesky-feeds-rest
    port: 8080
    description: REST adapter for Bluesky Social API — Feeds. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/xrpc/app-bsky-feed-describefeedgenerator
      name: xrpc-app-bsky-feed-describefeedgenerator
      description: REST surface for xrpc-app.bsky.feed.describeFeedGenerator.
      operations:
      - method: GET
        name: feeddescribefeedgenerator
        description: Bluesky Get information about a feed generator, including policies and offered feed URIs.
        call: bluesky-feeds.feeddescribefeedgenerator
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/xrpc/app-bsky-feed-getactorfeeds
      name: xrpc-app-bsky-feed-getactorfeeds
      description: REST surface for xrpc-app.bsky.feed.getActorFeeds.
      operations:
      - method: GET
        name: feedgetactorfeeds
        description: Bluesky Get a list of feeds (feed generator records) created by the actor (in the actor's repo).
        call: bluesky-feeds.feedgetactorfeeds
        with:
          actor: rest.actor
          limit: rest.limit
          cursor: rest.cursor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/xrpc/app-bsky-feed-getactorlikes
      name: xrpc-app-bsky-feed-getactorlikes
      description: REST surface for xrpc-app.bsky.feed.getActorLikes.
      operations:
      - method: GET
        name: feedgetactorlikes
        description: Bluesky Get a list of posts liked by an actor.
        call: bluesky-feeds.feedgetactorlikes
        with:
          actor: rest.actor
