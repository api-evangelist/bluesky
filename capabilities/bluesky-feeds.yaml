        destructive: false
        idempotent: true
      call: bluesky-feeds.feedgetauthorfeed
      with:
        actor: tools.actor
        limit: tools.limit
        cursor: tools.cursor
        filter: tools.filter
        includePins: tools.includePins
      outputParameters:
      - type: object
        mapping: $.
    - name: bluesky-get-hydrated-feed-actor-s
      description: Bluesky Get a hydrated feed from an actor's selected feed generator.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bluesky-feeds.feedgetfeed
      with:
        feed: tools.feed
        limit: tools.limit
        cursor: tools.cursor
      outputParameters:
      - type: object
        mapping: $.
    - name: bluesky-get-information-about-feed-2
      description: Bluesky Get information about a feed generator.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bluesky-feeds.feedgetfeedgenerator
      with:
