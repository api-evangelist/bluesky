          cursor: rest.cursor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/xrpc/app-bsky-feed-getauthorfeed
      name: xrpc-app-bsky-feed-getauthorfeed
      description: REST surface for xrpc-app.bsky.feed.getAuthorFeed.
      operations:
      - method: GET
        name: feedgetauthorfeed
        description: Bluesky Get a view of an actor's 'author feed' (post and reposts by the author).
        call: bluesky-feeds.feedgetauthorfeed
        with:
          actor: rest.actor
          limit: rest.limit
          cursor: rest.cursor
          filter: rest.filter
          includePins: rest.includePins
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/xrpc/app-bsky-feed-getfeed
      name: xrpc-app-bsky-feed-getfeed
      description: REST surface for xrpc-app.bsky.feed.getFeed.
      operations:
      - method: GET
        name: feedgetfeed
        description: Bluesky Get a hydrated feed from an actor's selected feed generator.
        call: bluesky-feeds.feedgetfeed
        with:
          feed: rest.feed
          limit: rest.limit
          cursor: rest.cursor
        outputParameters:
        - type: object
