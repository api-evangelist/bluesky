    - path: /v1/xrpc/app-bsky-feed-getfeedgenerator
      name: xrpc-app-bsky-feed-getfeedgenerator
      description: REST surface for xrpc-app.bsky.feed.getFeedGenerator.
      operations:
      - method: GET
        name: feedgetfeedgenerator
        description: Bluesky Get information about a feed generator.
        call: bluesky-feeds.feedgetfeedgenerator
        with:
          feed: rest.feed
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/xrpc/app-bsky-feed-getfeedgenerators
      name: xrpc-app-bsky-feed-getfeedgenerators
      description: REST surface for xrpc-app.bsky.feed.getFeedGenerators.
      operations:
      - method: GET
        name: feedgetfeedgenerators
        description: Bluesky Get information about a list of feed generators.
        call: bluesky-feeds.feedgetfeedgenerators
        with:
          feeds: rest.feeds
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/xrpc/app-bsky-feed-getfeedskeleton
      name: xrpc-app-bsky-feed-getfeedskeleton
      description: REST surface for xrpc-app.bsky.feed.getFeedSkeleton.
      operations:
      - method: GET
        name: feedgetfeedskeleton
