naftiko: 1.0.0-alpha2
info:
  label: Bluesky Social API — Ozone Sets
  description: 'Bluesky Social API — Ozone Sets. 6 operations. Lead operation: Bluesky Add values to a specific set.. Self-contained
    Naftiko capability covering one Bluesky business surface.'
  tags:
  - Bluesky
  - Ozone Sets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BLUESKY_API_KEY: BLUESKY_API_KEY
capability:
  consumes:
  - type: http
    namespace: bluesky-ozone-sets
    baseUri: https://bsky.social/xrpc
    description: Bluesky Social API — Ozone Sets business capability. Self-contained, no shared references.
    resources:
    - name: xrpc-tools.ozone.set.addValues
      path: /xrpc/tools.ozone.set.addValues
      operations:
      - name: ozonesetaddvalues
        method: POST
        description: Bluesky Add values to a specific set.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: xrpc-tools.ozone.set.deleteSet
      path: /xrpc/tools.ozone.set.deleteSet
      operations:
      - name: ozonesetdeleteset
        method: POST
        description: Bluesky Delete an entire set.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: xrpc-tools.ozone.set.deleteValues
      path: /xrpc/tools.ozone.set.deleteValues
      operations:
      - name: ozonesetdeletevalues
        method: POST
        description: Bluesky Delete values from a specific set.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: xrpc-tools.ozone.set.getValues
      path: /xrpc/tools.ozone.set.getValues
      operations:
      - name: ozonesetgetvalues
        method: GET
        description: Bluesky Get a specific set and its values
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          required: true
        - name: limit
          in: query
          type: integer
        - name: cursor
          in: query
          type: string
    - name: xrpc-tools.ozone.set.querySets
      path: /xrpc/tools.ozone.set.querySets
      operations:
      - name: ozonesetquerysets
        method: GET
        description: Bluesky Query available sets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: cursor
          in: query
          type: string
        - name: namePrefix
          in: query
          type: string
        - name: sortBy
          in: query
          type: string
        - name: sortDirection
          in: query
          type: string
          description: Defaults to ascending order of name field.
    - name: xrpc-tools.ozone.set.upsertSet
      path: /xrpc/tools.ozone.set.upsertSet
      operations:
      - name: ozonesetupsertset
        method: POST
        description: Bluesky Create or update set metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.BLUESKY_API_KEY}}'
  exposes:
  - type: rest
    namespace: bluesky-ozone-sets-rest
    port: 8080
    description: REST adapter for Bluesky Social API — Ozone Sets. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/xrpc/tools-ozone-set-addvalues
      name: xrpc-tools-ozone-set-addvalues
      description: REST surface for xrpc-tools.ozone.set.addValues.
      operations:
      - method: POST
        name: ozonesetaddvalues
        description: Bluesky Add values to a specific set.
        call: bluesky-ozone-sets.ozonesetaddvalues
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/xrpc/tools-ozone-set-deleteset
      name: xrpc-tools-ozone-set-deleteset
      description: REST surface for xrpc-tools.ozone.set.deleteSet.
      operations:
      - method: POST
        name: ozonesetdeleteset
        description: Bluesky Delete an entire set.
        call: bluesky-ozone-sets.ozonesetdeleteset
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/xrpc/tools-ozone-set-deletevalues
      name: xrpc-tools-ozone-set-deletevalues
      description: REST surface for xrpc-tools.ozone.set.deleteValues.
      operations:
      - method: POST
        name: ozonesetdeletevalues
        description: Bluesky Delete values from a specific set.
        call: bluesky-ozone-sets.ozonesetdeletevalues
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/xrpc/tools-ozone-set-getvalues
      name: xrpc-tools-ozone-set-getvalues
      description: REST surface for xrpc-tools.ozone.set.getValues.
      operations:
      - method: GET
        name: ozonesetgetvalues
        description: Bluesky Get a specific set and its values
        call: bluesky-ozone-sets.ozonesetgetvalues
        with:
          name: rest.name
          limit: rest.limit
          cursor: rest.cursor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/xrpc/tools-ozone-set-querysets
      name: xrpc-tools-ozone-set-querysets
      description: REST surface for xrpc-tools.ozone.set.querySets.
      operations:
      - method: GET
        name: ozonesetquerysets
        description: Bluesky Query available sets
        call: bluesky-ozone-sets.ozonesetquerysets
        with:
          limit: rest.limit
          cursor: rest.cursor
          namePrefix: rest.namePrefix
          sortBy: rest.sortBy
          sortDirection: rest.sortDirection
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/xrpc/tools-ozone-set-upsertset
      name: xrpc-tools-ozone-set-upsertset
      description: REST surface for xrpc-tools.ozone.set.upsertSet.
      operations:
      - method: POST
        name: ozonesetupsertset
        description: Bluesky Create or update set metadata
        call: bluesky-ozone-sets.ozonesetupsertset
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
