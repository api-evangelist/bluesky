        idempotent: false
      call: bluesky-ozone-sets.ozonesetdeletevalues
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: bluesky-get-specific-set-and
      description: Bluesky Get a specific set and its values
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bluesky-ozone-sets.ozonesetgetvalues
      with:
        name: tools.name
        limit: tools.limit
        cursor: tools.cursor
      outputParameters:
      - type: object
        mapping: $.
    - name: bluesky-query-available-sets
      description: Bluesky Query available sets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bluesky-ozone-sets.ozonesetquerysets
      with:
        limit: tools.limit
        cursor: tools.cursor
        namePrefix: tools.namePrefix
        sortBy: tools.sortBy
        sortDirection: tools.sortDirection
      outputParameters:
      - type: object
        mapping: $.
    - name: bluesky-create-update-set-metadata
      description: Bluesky Create or update set metadata
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bluesky-ozone-sets.ozonesetupsertset
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
