    port: 9090
    transport: http
    description: MCP adapter for Bluesky Social API — Ozone Sets. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: bluesky-add-values-specific-set
      description: Bluesky Add values to a specific set.
