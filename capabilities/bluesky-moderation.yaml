naftiko: 1.0.0-alpha2
info:
  label: Bluesky Social API — Moderation
  description: 'Bluesky Social API — Moderation. 1 operations. Lead operation: Bluesky Submit a moderation report regarding
    an atproto account or record.. Self-contained Naftiko capability covering one Bluesky business surface.'
  tags:
  - Bluesky
  - Moderation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BLUESKY_API_KEY: BLUESKY_API_KEY
capability:
  consumes:
  - type: http
    namespace: bluesky-moderation
    baseUri: https://bsky.social/xrpc
    description: Bluesky Social API — Moderation business capability. Self-contained, no shared references.
    resources:
    - name: xrpc-com.atproto.moderation.createReport
      path: /xrpc/com.atproto.moderation.createReport
      operations:
      - name: moderationcreatereport
        method: POST
        description: Bluesky Submit a moderation report regarding an atproto account or record.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.BLUESKY_API_KEY}}'
  exposes:
  - type: rest
    namespace: bluesky-moderation-rest
    port: 8080
    description: REST adapter for Bluesky Social API — Moderation. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/xrpc/com-atproto-moderation-createreport
      name: xrpc-com-atproto-moderation-createreport
      description: REST surface for xrpc-com.atproto.moderation.createReport.
      operations:
      - method: POST
        name: moderationcreatereport
        description: Bluesky Submit a moderation report regarding an atproto account or record.
        call: bluesky-moderation.moderationcreatereport
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bluesky-moderation-mcp
    port: 9090
    transport: http
    description: MCP adapter for Bluesky Social API — Moderation. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: bluesky-submit-moderation-report-regarding
      description: Bluesky Submit a moderation report regarding an atproto account or record.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bluesky-moderation.moderationcreatereport
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
