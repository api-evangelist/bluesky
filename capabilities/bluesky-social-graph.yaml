        description: Bluesky Get a list of starter packs created by the actor.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: actor
          in: query
          type: string
          required: true
        - name: limit
          in: query
          type: integer
        - name: cursor
          in: query
          type: string
    - name: xrpc-app.bsky.graph.getBlocks
