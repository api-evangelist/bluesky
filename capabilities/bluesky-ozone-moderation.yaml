      - type: object
        mapping: $.
    - name: bluesky-get-details-about-some-2
      description: Bluesky Get details about some repositories.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bluesky-ozone-moderation.ozonemoderationgetrepos
      with:
        dids: tools.dids
