  /xrpc/com.atproto.repo.uploadBlob:
    post:
      operationId: repoUploadBlob
      summary: Bluesky Upload a new blob, to be referenced from a repository record.
      description: '*This endpoint is part of the atproto PDS repository management APIs. Requests usually require authentication (unlike the `com.atproto.sync.*` endpoints), and are made directly to the user''s own PDS instance.*


        *To learn more about calling atproto API endpoints like this one, see the [API Hosts and Auth](/docs/advanced-guides/api-directory) guide.*


        Upload a new blob, to be referenced from a repository record. The blob will be deleted if it is not referenced within a time window (eg, minutes). Blob restrictions (mimetype, size, etc) are enforced when the reference is created. Requires auth, implemented by PDS.'
      tags:
      - Repository
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
        dispatcherRules: ''
      security:
      - Bearer: []
      requestBody:
        required: true
        content:
          '*/*': {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                - blob
                properties:
                  blob:
                    type: string
                    format: binary
              examples:
                RepoUploadBlobResponse200Example:
                  $ref: '#/components/examples/RepoUploadBlobResponse200Example'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                required:
                - error
                - message
                properties:
                  error:
                    type: string
                    enum:
                    - InvalidRequest
                    - ExpiredToken
                    - InvalidToken
                  message:
                    type: string
        '401':
          description: Unauthorized
          content:
