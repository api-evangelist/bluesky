              schema:
                type: object
                required:
                - error
                - message
                properties:
                  error:
                    type: string
                    enum:
                    - InvalidRequest
                    - ExpiredToken
                    - InvalidToken
                    - InvalidSwap
                  message:
                    type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                - error
                - message
                properties:
                  error:
                    const: AuthMissing
                  message:
                    type: string
  /xrpc/com.atproto.repo.describeRepo:
    get:
      operationId: repoDescribeRepo
      summary: Bluesky Get information about an account and repository, including the list of collections.
      description: '*This endpoint is part of the atproto PDS repository management APIs. Requests usually require authentication (unlike the `com.atproto.sync.*` endpoints), and are made directly to the user''s own PDS instance.*


        *To learn more about calling atproto API endpoints like this one, see the [API Hosts and Auth](/docs/advanced-guides/api-directory) guide.*


        Get information about an account and repository, including the list of collections. Does not require auth.'
      tags:
      - Repository
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
        dispatcherRules: ''
      security:
      - Bearer: []
      parameters:
      - name: repo
        in: query
        description: The handle or DID of the repo.
        required: true
        schema:
          type: string
          description: The handle or DID of the repo.
          format: at-identifier
        example: user.bsky.social
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                - handle
                - did
                - didDoc
                - collections
                - handleIsCorrect
                properties:
                  handle:
                    type: string
                    format: handle
                  did:
                    type: string
                    format: did
                  didDoc: {}
                  collections:
                    type: array
                    items:
                      type: string
                      format: nsid
                  handleIsCorrect:
                    type: boolean
                    description: Indicates if handle is currently valid (resolves bi-directionally)
              examples:
                RepoDescribeRepoResponse200Example:
                  $ref: '#/components/examples/RepoDescribeRepoResponse200Example'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                required:
                - error
                - message
                properties:
                  error:
                    type: string
                    enum:
                    - InvalidRequest
                    - ExpiredToken
                    - InvalidToken
                  message:
                    type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                - error
                - message
                properties:
                  error:
                    const: AuthMissing
                  message:
                    type: string
  /xrpc/com.atproto.repo.getRecord:
    get:
      operationId: repoGetRecord
      summary: Bluesky Get a single record from a repository.
      description: '*This endpoint is part of the atproto PDS repository management APIs. Requests usually require authentication (unlike the `com.atproto.sync.*` endpoints), and are made directly to the user''s own PDS instance.*


        *To learn more about calling atproto API endpoints like this one, see the [API Hosts and Auth](/docs/advanced-guides/api-directory) guide.*


        Get a single record from a repository. Does not require auth.'
      tags:
      - Repository
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
        dispatcherRules: ''
      security:
      - Bearer: []
      parameters:
      - name: repo
        in: query
        description: The handle or DID of the repo.
        required: true
        schema:
          type: string
          description: The handle or DID of the repo.
          format: at-identifier
        example: user.bsky.social
      - name: collection
        in: query
        description: The NSID of the record collection.
        required: true
        schema:
          type: string
          description: The NSID of the record collection.
          format: nsid
        example: app.bsky.feed.post
      - name: rkey
        in: query
        description: The Record Key.
        required: true
        schema:
          type: string
          description: The Record Key.
        example: example-rkey
      - name: cid
        in: query
        description: The CID of the version of the record. If not specified, then return the most recent version.
        required: false
        schema:
          type: string
          description: The CID of the version of the record. If not specified, then return the most recent version.
          format: cid
        example: bafyreiabc123example
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                - uri
                - value
                properties:
                  uri:
                    type: string
                    format: at-uri
                  cid:
                    type: string
                    format: cid
                  value: {}
              examples:
                RepoGetRecordResponse200Example:
                  $ref: '#/components/examples/RepoGetRecordResponse200Example'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                required:
                - error
                - message
                properties:
                  error:
                    type: string
                    enum:
                    - InvalidRequest
                    - ExpiredToken
                    - InvalidToken
                    - RecordNotFound
                  message:
                    type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                - error
                - message
                properties:
                  error:
                    const: AuthMissing
                  message:
                    type: string
