  /xrpc/com.atproto.repo.listMissingBlobs:
    get:
      operationId: repoListMissingBlobs
      summary: Bluesky Returns a list of missing blobs for the requesting account.
      description: '*This endpoint is part of the atproto PDS repository management APIs. Requests usually require authentication (unlike the `com.atproto.sync.*` endpoints), and are made directly to the user''s own PDS instance.*


        *To learn more about calling atproto API endpoints like this one, see the [API Hosts and Auth](/docs/advanced-guides/api-directory) guide.*


        Returns a list of missing blobs for the requesting account. Intended to be used in the account migration flow.'
      tags:
      - Repository
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
        dispatcherRules: ''
      security:
      - Bearer: []
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 1000
          default: 500
        example: 500
      - name: cursor
        in: query
        required: false
        schema:
          type: string
        example: eyJsYXN0SWQiOiIxMjM0NTYifQ
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                - blobs
                properties:
                  cursor:
                    type: string
                  blobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/ComAtprotoRepoListMissingBlobsRecordBlob'
              examples:
                RepoListMissingBlobsResponse200Example:
                  $ref: '#/components/examples/RepoListMissingBlobsResponse200Example'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                required:
                - error
                - message
                properties:
                  error:
                    type: string
                    enum:
                    - InvalidRequest
                    - ExpiredToken
                    - InvalidToken
                  message:
                    type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                - error
                - message
                properties:
                  error:
                    const: AuthMissing
                  message:
                    type: string
  /xrpc/com.atproto.repo.listRecords:
    get:
      operationId: repoListRecords
