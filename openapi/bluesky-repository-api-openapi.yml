      - name: collection
        in: query
        description: The NSID of the record type.
        required: true
        schema:
          type: string
          description: The NSID of the record type.
          format: nsid
        example: app.bsky.feed.post
      - name: limit
        in: query
        description: The number of records to return.
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
        example: 50
      - name: cursor
        in: query
        required: false
        schema:
          type: string
        example: eyJsYXN0SWQiOiIxMjM0NTYifQ
      - name: reverse
