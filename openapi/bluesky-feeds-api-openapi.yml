      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
        example: 50
      - name: cursor
        in: query
        required: false
        schema:
          type: string
        example: eyJsYXN0SWQiOiIxMjM0NTYifQ
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                - feeds
                properties:
                  cursor:
                    type: string
                  feeds:
                    type: array
                    items:
                      $ref: '#/components/schemas/AppBskyFeedDefsGeneratorView'
              examples:
                FeedGetActorFeedsResponse200Example:
