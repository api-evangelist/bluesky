      - Feeds
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
        dispatcherRules: ''
      security:
      - Bearer: []
      parameters:
      - name: actor
        in: query
        required: true
        schema:
          type: string
          format: at-identifier
        example: user.bsky.social
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
        example: 50
      - name: cursor
        in: query
        required: false
        schema:
          type: string
        example: eyJsYXN0SWQiOiIxMjM0NTYifQ
      - name: filter
        in: query
        description: Combinations of post/repost types to include in response.
        required: false
        schema:
          type: string
          description: Combinations of post/repost types to include in response.
          default: posts_with_replies
          enum:
          - posts_with_replies
          - posts_no_replies
