          default: true
        author:
          $ref: '#/components/schemas/AppBskyFeedDefsBlockedAuthor'
    AppBskyFeedDefsThreadViewPost:
      type: object
      required:
      - post
      properties:
        post:
          $ref: '#/components/schemas/AppBskyFeedDefsPostView'
        parent:
          oneOf:
          - $ref: '#/components/schemas/AppBskyFeedDefsThreadViewPost'
          - $ref: '#/components/schemas/AppBskyFeedDefsNotFoundPost'
          - $ref: '#/components/schemas/AppBskyFeedDefsBlockedPost'
        replies:
          type: array
          items:
            oneOf:
            - $ref: '#/components/schemas/AppBskyFeedDefsThreadViewPost'
            - $ref: '#/components/schemas/AppBskyFeedDefsNotFoundPost'
            - $ref: '#/components/schemas/AppBskyFeedDefsBlockedPost'
