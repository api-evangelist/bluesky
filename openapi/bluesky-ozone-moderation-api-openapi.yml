      type: object
      properties:
        subjectStatus:
          $ref: '#/components/schemas/ToolsOzoneModerationDefsSubjectStatusView'
    ToolsOzoneModerationDefsModEventReverseTakedown:
      type: object
      description: Revert take down action on a subject
      properties:
        comment:
          type: string
          description: Describe reasoning behind the reversal.
    ToolsOzoneModerationDefsIdentityEvent:
      type: object
      description: Logs identity related events on a repo subject. Normally captured by automod from the firehose and emitted to ozone for historical tracking.
      required:
      - timestamp
      properties:
        comment:
          type: string
        handle:
          type: string
          format: handle
        pdsHost:
          type: string
          format: uri
        tombstone:
          type: boolean
        timestamp:
          type: string
          format: date-time
    ComAtprotoModerationDefsReasonMisleading:
      type: string
      format: token
      description: Misleading identity, affiliation, or content
    ToolsOzoneModerationDefsRepoViewNotFound:
      type: object
      required:
      - did
      properties:
        did:
          type: string
          format: did
    ToolsOzoneModerationDefsModEventUnmute:
      type: object
      description: Unmute action on a subject
      properties:
        comment:
          type: string
          description: Describe reasoning behind the reversal.
    ComAtprotoServerDefsInviteCodeUse:
      type: object
      required:
      - usedBy
      - usedAt
      properties:
        usedBy:
          type: string
          format: did
        usedAt:
          type: string
          format: date-time
    ToolsOzoneModerationDefsBlobView:
      type: object
      required:
      - cid
      - mimeType
      - size
      - createdAt
      properties:
        cid:
          type: string
          format: cid
        mimeType:
          type: string
        size:
          type: integer
        createdAt:
          type: string
          format: date-time
        details:
          oneOf:
          - $ref: '#/components/schemas/ToolsOzoneModerationDefsImageDetails'
          - $ref: '#/components/schemas/ToolsOzoneModerationDefsVideoDetails'
        moderation:
          $ref: '#/components/schemas/ToolsOzoneModerationDefsModeration'
    ToolsOzoneModerationDefsModEventEmail:
      type: object
      description: Keep a log of outgoing email to a user
      required:
      - subjectLine
      properties:
        subjectLine:
          type: string
          description: The subject line of the email sent to the user.
        content:
          type: string
          description: The content of the email sent to the user.
        comment:
          type: string
          description: Additional comment about the outgoing comm.
    ToolsOzoneModerationDefsModEventTag:
      type: object
      description: Add/Remove a tag on a subject
      required:
      - add
      - remove
      properties:
        add:
          type: array
          items:
            type: string
        remove:
          type: array
          items:
            type: string
        comment:
          type: string
          description: Additional comment about added/removed tags.
    ToolsOzoneModerationDefsModEventResolveAppeal:
      type: object
      description: Resolve appeal on a subject
      properties:
        comment:
          type: string
          description: Describe resolution.
