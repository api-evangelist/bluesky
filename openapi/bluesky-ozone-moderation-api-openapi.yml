    ToolsOzoneModerationDefsAccountEvent:
      type: object
      description: Logs account status related events on a repo subject. Normally captured by automod from the firehose and emitted to ozone for historical tracking.
      required:
      - timestamp
      - active
      properties:
        comment:
          type: string
        active:
          type: boolean
          description: Indicates that the account has a repository which can be fetched from the host that emitted this event.
        status:
          type: string
          enum:
          - unknown
          - deactivated
          - deleted
          - takendown
          - suspended
          - tombstoned
        timestamp:
          type: string
          format: date-time
    ComAtprotoLabelDefsLabel:
      type: object
      description: Metadata tag on an atproto resource (eg, repo or record).
      required:
      - src
      - uri
      - val
      - cts
      properties:
        ver:
          type: integer
        src:
          type: string
          description: DID of the actor who created this label.
          format: did
        uri:
          type: string
          description: AT URI of the record, repository (account), or other resource that this label applies to.
          format: uri
        cid:
          type: string
          description: Optionally, CID specifying the specific version of 'uri' resource this label applies to.
          format: cid
        val:
          type: string
          description: The short string name of the value or type of this label.
          maxLength: 128
        neg:
          type: boolean
          description: If true, this is a negation label, overwriting a previous label.
        cts:
          type: string
          description: Timestamp when this label was created.
          format: date-time
        exp:
          type: string
          description: Timestamp at which this label expires (no longer applies).
          format: date-time
        sig:
          type: string
          format: byte
          description: Signature of dag-cbor encoded label.
