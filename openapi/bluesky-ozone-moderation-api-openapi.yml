  /xrpc/tools.ozone.moderation.queryEvents:
    get:
      operationId: ozoneModerationQueryEvents
      summary: Bluesky List moderation events related to a subject.
      description: '*This endpoint is part of the [Ozone moderation service](https://ozone.tools/) APIs. Requests usually require authentication, are directed to the user''s PDS intance, and proxied to the Ozone instance indicated by the DID in the service proxying header. Admin authenentication may also be possible, with request sent directly to the Ozone instance.*


        *To learn more about calling atproto API endpoints like this one, see the [API Hosts and Auth](/docs/advanced-guides/api-directory) guide.*


        List moderation events related to a subject.'
      tags:
      - Ozone Moderation
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
        dispatcherRules: ''
      security:
      - Bearer: []
      parameters:
      - name: types
        in: query
        description: The types of events (fully qualified string in the format of tools.ozone.moderation.defs#modEvent<name>) to filter by. If not specified, all events are returned.
        required: false
        schema:
          type: array
          items:
            type: string
        example:
        - example-types
      - name: createdBy
        in: query
        required: false
        schema:
          type: string
          format: did
        example: did:plc:example123abc
      - name: sortDirection
        in: query
        description: Sort direction for the events. Defaults to descending order of created at timestamp.
        required: false
        schema:
          type: string
          description: Sort direction for the events. Defaults to descending order of created at timestamp.
          default: desc
        example: example-sortDirection
      - name: createdAfter
        in: query
        description: Retrieve events created after a given timestamp
        required: false
        schema:
          type: string
          description: Retrieve events created after a given timestamp
          format: date-time
        example: '2024-01-15T12:00:00.000Z'
      - name: createdBefore
        in: query
        description: Retrieve events created before a given timestamp
        required: false
        schema:
          type: string
          description: Retrieve events created before a given timestamp
          format: date-time
        example: '2024-01-15T12:00:00.000Z'
      - name: subject
        in: query
        required: false
        schema:
          type: string
          format: uri
        example: https://example.com/resource
      - name: collections
        in: query
        description: If specified, only events where the subject belongs to the given collections will be returned. When subjectType is set to 'account', this will be ignored.
        required: false
        schema:
          type: array
          items:
            type: string
            format: nsid
          maxItems: 20
        example:
        - app.bsky.feed.post
      - name: subjectType
        in: query
        description: If specified, only events where the subject is of the given type (account or record) will be returned. When this is set to 'account' the 'collections' parameter will be ignored. When includeAllUserRecords or subject is set, this will be ignored.
        required: false
        schema:
          type: string
          description: If specified, only events where the subject is of the given type (account or record) will be returned. When this is set to 'account' the 'collections' parameter will be ignored. When includeAllUserRecords or subject is set, this will be ignored.
          enum:
          - account
          - record
        example: account
      - name: includeAllUserRecords
        in: query
        description: If true, events on all record types (posts, lists, profile etc.) or records from given 'collections' param, owned by the did are returned.
        required: false
        schema:
          type: boolean
          description: If true, events on all record types (posts, lists, profile etc.) or records from given 'collections' param, owned by the did are returned.
        example: true
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
        example: 50
      - name: hasComment
        in: query
        description: If true, only events with comments are returned
        required: false
        schema:
          type: boolean
          description: If true, only events with comments are returned
        example: true
      - name: comment
        in: query
        description: If specified, only events with comments containing the keyword are returned
        required: false
        schema:
          type: string
          description: If specified, only events with comments containing the keyword are returned
        example: example-comment
      - name: addedLabels
        in: query
        description: If specified, only events where all of these labels were added are returned
        required: false
        schema:
          type: array
          items:
            type: string
        example:
        - example-addedLabels
      - name: removedLabels
        in: query
        description: If specified, only events where all of these labels were removed are returned
        required: false
        schema:
          type: array
          items:
            type: string
        example:
        - example-removedLabels
      - name: addedTags
        in: query
        description: If specified, only events where all of these tags were added are returned
        required: false
        schema:
          type: array
          items:
            type: string
        example:
        - example-addedTags
      - name: removedTags
        in: query
        description: If specified, only events where all of these tags were removed are returned
        required: false
        schema:
          type: array
          items:
            type: string
        example:
        - example-removedTags
      - name: reportTypes
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        example:
        - example-reportTypes
      - name: cursor
        in: query
        required: false
        schema:
          type: string
        example: eyJsYXN0SWQiOiIxMjM0NTYifQ
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                - events
                properties:
                  cursor:
                    type: string
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/ToolsOzoneModerationDefsModEventView'
              examples:
                OzoneModerationQueryEventsResponse200Example:
                  $ref: '#/components/examples/OzoneModerationQueryEventsResponse200Example'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                required:
                - error
                - message
                properties:
                  error:
                    type: string
                    enum:
                    - InvalidRequest
                    - ExpiredToken
                    - InvalidToken
                  message:
                    type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                - error
                - message
                properties:
                  error:
                    const: AuthMissing
                  message:
                    type: string
  /xrpc/tools.ozone.moderation.queryStatuses:
    get:
      operationId: ozoneModerationQueryStatuses
      summary: Bluesky View moderation statuses of subjects (record or repo).
      description: '*This endpoint is part of the [Ozone moderation service](https://ozone.tools/) APIs. Requests usually require authentication, are directed to the user''s PDS intance, and proxied to the Ozone instance indicated by the DID in the service proxying header. Admin authenentication may also be possible, with request sent directly to the Ozone instance.*


        *To learn more about calling atproto API endpoints like this one, see the [API Hosts and Auth](/docs/advanced-guides/api-directory) guide.*


        View moderation statuses of subjects (record or repo).'
      tags:
      - Ozone Moderation
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
        dispatcherRules: ''
      security:
      - Bearer: []
      parameters:
      - name: includeAllUserRecords
        in: query
        description: All subjects, or subjects from given 'collections' param, belonging to the account specified in the 'subject' param will be returned.
        required: false
        schema:
          type: boolean
          description: All subjects, or subjects from given 'collections' param, belonging to the account specified in the 'subject' param will be returned.
        example: true
      - name: subject
        in: query
        description: The subject to get the status for.
        required: false
        schema:
          type: string
          description: The subject to get the status for.
          format: uri
        example: https://example.com/resource
      - name: comment
        in: query
        description: Search subjects by keyword from comments
        required: false
        schema:
          type: string
          description: Search subjects by keyword from comments
        example: example-comment
      - name: reportedAfter
        in: query
        description: Search subjects reported after a given timestamp
        required: false
        schema:
          type: string
          description: Search subjects reported after a given timestamp
          format: date-time
        example: '2024-01-15T12:00:00.000Z'
      - name: reportedBefore
        in: query
        description: Search subjects reported before a given timestamp
        required: false
        schema:
          type: string
          description: Search subjects reported before a given timestamp
          format: date-time
        example: '2024-01-15T12:00:00.000Z'
      - name: reviewedAfter
        in: query
        description: Search subjects reviewed after a given timestamp
        required: false
        schema:
          type: string
          description: Search subjects reviewed after a given timestamp
          format: date-time
        example: '2024-01-15T12:00:00.000Z'
      - name: hostingDeletedAfter
        in: query
        description: Search subjects where the associated record/account was deleted after a given timestamp
        required: false
        schema:
          type: string
          description: Search subjects where the associated record/account was deleted after a given timestamp
          format: date-time
        example: '2024-01-15T12:00:00.000Z'
      - name: hostingDeletedBefore
        in: query
        description: Search subjects where the associated record/account was deleted before a given timestamp
        required: false
        schema:
          type: string
          description: Search subjects where the associated record/account was deleted before a given timestamp
          format: date-time
        example: '2024-01-15T12:00:00.000Z'
      - name: hostingUpdatedAfter
        in: query
        description: Search subjects where the associated record/account was updated after a given timestamp
        required: false
        schema:
          type: string
          description: Search subjects where the associated record/account was updated after a given timestamp
          format: date-time
        example: '2024-01-15T12:00:00.000Z'
      - name: hostingUpdatedBefore
        in: query
        description: Search subjects where the associated record/account was updated before a given timestamp
        required: false
        schema:
          type: string
          description: Search subjects where the associated record/account was updated before a given timestamp
          format: date-time
        example: '2024-01-15T12:00:00.000Z'
      - name: hostingStatuses
        in: query
        description: Search subjects by the status of the associated record/account
        required: false
        schema:
          type: array
          items:
            type: string
        example:
        - example-hostingStatuses
      - name: reviewedBefore
        in: query
        description: Search subjects reviewed before a given timestamp
        required: false
        schema:
          type: string
          description: Search subjects reviewed before a given timestamp
          format: date-time
        example: '2024-01-15T12:00:00.000Z'
      - name: includeMuted
        in: query
        description: By default, we don't include muted subjects in the results. Set this to true to include them.
        required: false
        schema:
          type: boolean
          description: By default, we don't include muted subjects in the results. Set this to true to include them.
        example: true
      - name: onlyMuted
        in: query
        description: When set to true, only muted subjects and reporters will be returned.
        required: false
        schema:
          type: boolean
          description: When set to true, only muted subjects and reporters will be returned.
        example: true
      - name: reviewState
        in: query
        description: Specify when fetching subjects in a certain state
        required: false
        schema:
          type: string
          description: Specify when fetching subjects in a certain state
        example: example-reviewState
      - name: ignoreSubjects
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
            format: uri
        example:
        - https://example.com/resource
      - name: lastReviewedBy
        in: query
        description: Get all subject statuses that were reviewed by a specific moderator
        required: false
        schema:
          type: string
          description: Get all subject statuses that were reviewed by a specific moderator
          format: did
        example: did:plc:example123abc
      - name: sortField
        in: query
        required: false
        schema:
          type: string
          default: lastReportedAt
        example: example-sortField
      - name: sortDirection
        in: query
        required: false
        schema:
          type: string
          default: desc
        example: example-sortDirection
      - name: takendown
        in: query
        description: Get subjects that were taken down
        required: false
        schema:
          type: boolean
          description: Get subjects that were taken down
        example: true
      - name: appealed
        in: query
        description: Get subjects in unresolved appealed status
        required: false
        schema:
          type: boolean
          description: Get subjects in unresolved appealed status
        example: true
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
        example: 50
      - name: tags
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        example:
        - example-tags
      - name: excludeTags
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        example:
        - example-excludeTags
      - name: cursor
        in: query
        required: false
        schema:
          type: string
        example: eyJsYXN0SWQiOiIxMjM0NTYifQ
      - name: collections
        in: query
        description: If specified, subjects belonging to the given collections will be returned. When subjectType is set to 'account', this will be ignored.
        required: false
        schema:
          type: array
          items:
            type: string
            format: nsid
          maxItems: 20
        example:
        - app.bsky.feed.post
      - name: subjectType
        in: query
        description: If specified, subjects of the given type (account or record) will be returned. When this is set to 'account' the 'collections' parameter will be ignored. When includeAllUserRecords or subject is set, this will be ignored.
        required: false
        schema:
          type: string
          description: If specified, subjects of the given type (account or record) will be returned. When this is set to 'account' the 'collections' parameter will be ignored. When includeAllUserRecords or subject is set, this will be ignored.
          enum:
          - account
          - record
        example: account
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                - subjectStatuses
                properties:
                  cursor:
                    type: string
                  subjectStatuses:
                    type: array
                    items:
                      $ref: '#/components/schemas/ToolsOzoneModerationDefsSubjectStatusView'
              examples:
                OzoneModerationQueryStatusesResponse200Example:
                  $ref: '#/components/examples/OzoneModerationQueryStatusesResponse200Example'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                required:
                - error
                - message
                properties:
                  error:
                    type: string
                    enum:
                    - InvalidRequest
                    - ExpiredToken
                    - InvalidToken
                  message:
                    type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                - error
                - message
                properties:
                  error:
                    const: AuthMissing
                  message:
                    type: string
