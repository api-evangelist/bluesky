  /xrpc/com.atproto.server.getAccountInviteCodes:
    get:
      operationId: serverGetAccountInviteCodes
      summary: Bluesky Get all invite codes for the current account.
      description: '*This endpoint is part of the atproto PDS server and account management APIs. Requests often require authentication and are made directly to the user''s own PDS instance.*


        *To learn more about calling atproto API endpoints like this one, see the [API Hosts and Auth](/docs/advanced-guides/api-directory) guide.*


        Get all invite codes for the current account. Requires auth.'
      tags:
      - Server
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
        dispatcherRules: ''
      security:
      - Bearer: []
      parameters:
      - name: includeUsed
        in: query
        required: false
        schema:
          type: boolean
          default: true
        example: true
      - name: createAvailable
        in: query
        description: Controls whether any new 'earned' but not 'created' invites should be created.
        required: false
        schema:
          type: boolean
          description: Controls whether any new 'earned' but not 'created' invites should be created.
          default: true
        example: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                - codes
                properties:
                  codes:
