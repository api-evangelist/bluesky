  /xrpc/com.atproto.server.createAccount:
    post:
      operationId: serverCreateAccount
      summary: Bluesky Create an account.
      description: '*This endpoint is part of the atproto PDS server and account management APIs. Requests often require authentication and are made directly to the user''s own PDS instance.*


        *To learn more about calling atproto API endpoints like this one, see the [API Hosts and Auth](/docs/advanced-guides/api-directory) guide.*


        Create an account. Implemented by PDS.'
      tags:
      - Server
      x-microcks-operation:
        delay: 100
        dispatcher: FALLBACK
        dispatcherRules: ''
      security:
      - Bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - handle
              properties:
                email:
                  type: string
                handle:
                  type: string
                  description: Requested handle for the account.
                  format: handle
                did:
                  type: string
                  description: Pre-existing atproto DID, being imported to a new account.
                  format: did
                inviteCode:
                  type: string
                verificationCode:
                  type: string
                verificationPhone:
                  type: string
                password:
                  type: string
                  description: Initial account password. May need to meet instance-specific password strength requirements.
                recoveryKey:
                  type: string
                  description: DID PLC rotation key (aka, recovery key) to be included in PLC creation operation.
                plcOp: {}
            examples:
              ServerCreateAccountRequestExample:
                $ref: '#/components/examples/ServerCreateAccountRequestExample'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Account login session returned on successful account creation.
                required:
                - accessJwt
                - refreshJwt
                - handle
                - did
                properties:
                  accessJwt:
                    type: string
                  refreshJwt:
                    type: string
                  handle:
                    type: string
                    format: handle
                  did:
                    type: string
                    description: The DID of the new account.
                    format: did
                  didDoc: {}
              examples:
                ServerCreateAccountResponse200Example:
                  $ref: '#/components/examples/ServerCreateAccountResponse200Example'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                required:
                - error
                - message
                properties:
                  error:
                    type: string
                    enum:
                    - InvalidRequest
                    - ExpiredToken
                    - InvalidToken
                    - InvalidHandle
                    - InvalidPassword
                    - InvalidInviteCode
                    - HandleNotAvailable
                    - UnsupportedDomain
                    - UnresolvableDid
                    - IncompatibleDidDoc
                  message:
                    type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                - error
                - message
                properties:
                  error:
                    const: AuthMissing
                  message:
                    type: string
